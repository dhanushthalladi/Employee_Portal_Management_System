<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Apply Leave</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #111827,
    #1e293b,
    #2563eb);

    overflow:hidden;

    position:relative;
}

/* BACKGROUND GLOW */

body::before{

    content:'';

    position:absolute;

    width:450px;
    height:450px;

    background:
    rgba(59,130,246,0.25);

    border-radius:50%;

    filter:blur(120px);

    top:-150px;
    left:-150px;
}

body::after{

    content:'';

    position:absolute;

    width:400px;
    height:400px;

    background:
    rgba(168,85,247,0.2);

    border-radius:50%;

    filter:blur(120px);

    bottom:-120px;
    right:-100px;
}

/* MAIN CARD */

.leave-card{

    width:100%;
    max-width:700px;

    background:
    rgba(15,23,42,0.78);

    backdrop-filter:blur(18px);

    border-radius:30px;

    padding:50px;

    position:relative;

    z-index:10;

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 25px 50px rgba(0,0,0,0.35);
}

/* ICON */

.leave-icon{

    width:100px;
    height:100px;

    border-radius:50%;

    margin:auto;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:42px;

    color:white;

    background:
    linear-gradient(
    to right,
    #2563eb,
    #06b6d4,
    #8b5cf6);

    box-shadow:
    0 15px 30px rgba(37,99,235,0.4);

    margin-bottom:25px;
}

/* TITLE */

h1{

    text-align:center;

    font-size:48px;

    font-weight:800;

    background:
    linear-gradient(
    to right,
    #60a5fa,
    #22d3ee,
    #c084fc);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    margin-bottom:10px;
}

.subtitle{

    text-align:center;

    color:#cbd5e1;

    margin-bottom:35px;

    font-size:16px;
}

/* LABELS */

.form-label{

    color:white;

    font-weight:600;

    margin-bottom:10px;

    font-size:15px;
}

/* INPUTS */

.form-control,
.form-select{

    height:58px;

    border-radius:16px;

    border:
    1px solid rgba(255,255,255,0.08);

    background:
    rgba(255,255,255,0.06);

    color:white;

    padding-left:18px;

    font-size:15px;

    transition:0.3s;
}

textarea.form-control{

    height:130px;

    padding-top:15px;

    resize:none;
}

/* PLACEHOLDER */

.form-control::placeholder{

    color:#cbd5e1;
}

/* FOCUS */

.form-control:focus,
.form-select:focus{

    background:
    rgba(255,255,255,0.08);

    color:white;

    border-color:#3b82f6;

    box-shadow:
    0 0 0 4px rgba(59,130,246,0.2);
}

/* DATE ICON */

input[type="date"]{

    color:#e2e8f0;
}

/* BUTTON */

.apply-btn{

    width:100%;

    height:60px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
    to right,
    #2563eb,
    #06b6d4,
    #8b5cf6);

    color:white;

    font-size:18px;

    font-weight:700;

    margin-top:15px;

    transition:0.3s;
}

.apply-btn:hover{

    transform:
    translateY(-3px);

    box-shadow:
    0 15px 30px rgba(37,99,235,0.35);
}

/* FORM SPACING */

.input-box{

    margin-bottom:24px;
}

/* RESPONSIVE */

@media(max-width:768px){

    .leave-card{

        padding:35px 25px;
    }

    h1{

        font-size:36px;
    }

    .leave-icon{

        width:80px;
        height:80px;

        font-size:32px;
    }
}

</style>
</head>

<body>

<div class="leave-card">

    <!-- ICON -->

    <div class="leave-icon">

        <i class=
        "fa-solid fa-calendar-check"></i>

    </div>

    <!-- TITLE -->

    <h1>

        Apply Leave

    </h1>

    <p class="subtitle">

        Submit your leave request professionally

    </p>

    <!-- FORM -->

    <form th:action="@{/employee/saveLeave}"
          th:object="${leaveRequest}"
          method="post">

        <!-- HIDDEN EMPLOYEE ID -->

        <input type="hidden"
               th:field="*{employee.employeeId}">

        <!-- LEAVE TYPE -->

        <div class="input-box">

            <label class="form-label">

                Leave Type

            </label>

            <select th:field="*{leaveType}"
                    class="form-select">

                <option value="Sick Leave">

                    Sick Leave

                </option>

                <option value="Casual Leave">

                    Casual Leave

                </option>

                <option value="Vacation">

                    Vacation

                </option>

                <option value="Emergency Leave">

                    Emergency Leave

                </option>

            </select>

        </div>

        <!-- DATES -->

        <div class="row">

            <div class="col-md-6 input-box">

                <label class="form-label">

                    From Date

                </label>

                <input type="date"
                       th:field="*{fromDate}"
                       class="form-control">

            </div>

            <div class="col-md-6 input-box">

                <label class="form-label">

                    To Date

                </label>

                <input type="date"
                       th:field="*{toDate}"
                       class="form-control">

            </div>

        </div>

        <!-- REASON -->

        <div class="input-box">

            <label class="form-label">

                Reason

            </label>

            <textarea th:field="*{reason}"
                      class="form-control"
                      placeholder=
                      "Enter detailed leave reason">
            </textarea>

        </div>

        <!-- BUTTON -->

        <button type="submit"
                class="apply-btn">

            <i class=
            "fa-solid fa-paper-plane"></i>

            Apply Leave

        </button>

    </form>

</div>

</body>
</html>
