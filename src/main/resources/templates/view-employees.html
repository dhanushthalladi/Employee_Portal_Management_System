<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Employee Management</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
    135deg,
    #0f172a 0%,
    #111827 35%,
    #1e293b 70%,
    #0f172a 100%);

    min-height:100vh;

    padding:35px;

    position:relative;

    overflow-x:hidden;
}

/* GLOW EFFECTS */

body::before{

    content:'';

    position:absolute;

    width:500px;
    height:500px;

    background:
    rgba(59,130,246,0.18);

    border-radius:50%;

    filter:blur(120px);

    top:-150px;
    left:-150px;

    z-index:-1;
}

body::after{

    content:'';

    position:absolute;

    width:450px;
    height:450px;

    background:
    rgba(168,85,247,0.16);

    border-radius:50%;

    filter:blur(120px);

    bottom:-150px;
    right:-100px;

    z-index:-1;
}

/* HEADER */

.page-header{

    background:
    rgba(15,23,42,0.75);

    backdrop-filter:blur(18px);

    border-radius:30px;

    padding:45px;

    margin-bottom:35px;

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 20px 45px rgba(0,0,0,0.35);
}

.title{

    font-size:52px;

    font-weight:800;

    background:
    linear-gradient(
    to right,
    #60a5fa,
    #22d3ee,
    #a855f7);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    margin-bottom:12px;
}

.subtitle{

    color:#cbd5e1;

    font-size:18px;

    letter-spacing:0.5px;
}

/* DASHBOARD BUTTON */

.dashboard-btn{

    border:none;

    padding:14px 28px;

    border-radius:16px;

    background:
    linear-gradient(
    to right,
    #2563eb,
    #06b6d4);

    color:white;

    font-weight:600;

    transition:0.3s;
}

.dashboard-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 20px rgba(37,99,235,0.3);
}

/* SEARCH SECTION */

.search-section{

    background:
    rgba(15,23,42,0.72);

    backdrop-filter:blur(16px);

    border-radius:28px;

    padding:30px;

    margin-bottom:40px;

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);
}

/* INPUTS */

.form-control,
.form-select{

    height:60px;

    border-radius:18px;

    border:
    1px solid rgba(255,255,255,0.08);

    background:
    rgba(255,255,255,0.06);

    color:white;

    padding-left:20px;

    font-size:15px;
}

.form-control::placeholder{

    color:#cbd5e1;
}

.form-control:focus,
.form-select:focus{

    background:
    rgba(255,255,255,0.08);

    border-color:#3b82f6;

    color:white;

    box-shadow:
    0 0 0 4px rgba(59,130,246,0.2);
}

/* SELECT OPTIONS */

select option{

    color:black;
}

/* SEARCH BUTTON */

.search-btn{

    height:60px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
    to right,
    #2563eb,
    #06b6d4);

    color:white;

    font-size:18px;

    font-weight:700;

    transition:0.3s;
}

.search-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 20px rgba(37,99,235,0.25);
}

/* EMPLOYEE CARD */

.employee-card{

    background:
    rgba(15,23,42,0.82);

    backdrop-filter:blur(18px);

    border-radius:30px;

    overflow:hidden;

    border:
    1px solid rgba(255,255,255,0.06);

    transition:0.4s;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.35);

    height:100%;
}

.employee-card:hover{

    transform:
    translateY(-12px)
    scale(1.02);

    box-shadow:
    0 25px 60px rgba(0,0,0,0.45);
}

/* CARD TOP */

.card-top{

    background:
    linear-gradient(
    135deg,
    #2563eb,
    #06b6d4,
    #7c3aed);

    padding:40px;

    text-align:center;

    position:relative;
}

/* PROFILE IMAGE */

.profile-img{

    width:120px;
    height:120px;

    border-radius:50%;

    object-fit:cover;

    border:5px solid white;

    background:white;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.2);

    margin-bottom:20px;
}

/* EMPLOYEE NAME */

.employee-name{

    color:white;

    font-size:30px;

    font-weight:700;

    margin-bottom:12px;
}

/* EMPLOYEE ID */

.employee-id{

    display:inline-block;

    background:white;

    color:#2563eb;

    padding:8px 18px;

    border-radius:30px;

    font-weight:700;

    font-size:14px;
}

/* CARD BODY */

.card-body-custom{

    padding:30px;

    color:white;
}

/* INFO ROW */

.info-row{

    display:flex;

    align-items:center;

    margin-bottom:18px;

    font-size:15px;

    color:#e2e8f0;
}

/* ICONS */

.info-row i{

    width:40px;
    height:40px;

    border-radius:14px;

    background:
    rgba(59,130,246,0.15);

    color:#38bdf8;

    display:flex;

    justify-content:center;

    align-items:center;

    margin-right:14px;

    font-size:15px;
}

/* STATUS */

.status{

    display:inline-block;

    padding:10px 18px;

    border-radius:30px;

    font-size:13px;

    font-weight:700;
}

.active{

    background:
    linear-gradient(
    to right,
    #22c55e,
    #16a34a);

    color:white;
}

.pending{

    background:
    linear-gradient(
    to right,
    #facc15,
    #f59e0b);

    color:#111827;
}

/* BUTTON SECTION */

.action-buttons{

    margin-top:30px;
}

/* UPDATE BUTTON */

.update-btn{

    border:none;

    padding:12px 22px;

    border-radius:14px;

    background:
    linear-gradient(
    to right,
    #facc15,
    #f59e0b);

    color:#111827;

    font-weight:700;

    transition:0.3s;
}

.update-btn:hover{

    transform:scale(1.04);

    box-shadow:
    0 10px 20px rgba(250,204,21,0.3);
}

/* DELETE BUTTON */

.delete-btn{

    border:none;

    padding:12px 22px;

    border-radius:14px;

    background:
    linear-gradient(
    to right,
    #ef4444,
    #dc2626);

    color:white;

    font-weight:700;

    transition:0.3s;
}

.delete-btn:hover{

    transform:scale(1.04);

    box-shadow:
    0 10px 20px rgba(239,68,68,0.3);
}

/* RESPONSIVE */

@media(max-width:992px){

    .title{
        font-size:42px;
    }

    .employee-name{
        font-size:24px;
    }
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    .title{
        font-size:34px;
    }

    .page-header{
        padding:30px;
    }

    .search-section{
        padding:20px;
    }

    .employee-name{
        font-size:22px;
    }

    .profile-img{

        width:100px;
        height:100px;
    }
}

</style>

</head>

<body>

<div class="container-fluid">

<!-- HEADER -->

<div class="page-header">

<div class=
"d-flex justify-content-between
align-items-center flex-wrap">

<div>

<h1 class="title">

<i class=
"fa-solid fa-users"></i>

Employee Management

</h1>

<p class="subtitle">

Manage, search and update employees professionally

</p>

</div>

<a href="/admin/dashboard">

<button class="dashboard-btn">

<i class=
"fa-solid fa-arrow-left"></i>

Dashboard

</button>

</a>

</div>

</div>


<!-- SEARCH -->

<div class="search-section">

<form action="/admin/search"
      method="get">

<div class="row g-3">

<div class="col-lg-5">

<input type="text"
       name="keyword"
       class="form-control"
       placeholder=
       "Search Employee by Name or ID">

</div>

<div class="col-lg-4">

<select name="department"
        class="form-select">

<option value="">
Filter Department
</option>

<option value="HR">
HR
</option>

<option value="IT">
IT
</option>

<option value="Sales">
Sales
</option>

<option value="Finance">
Finance
</option>

</select>

</div>

<div class="col-lg-3">

<button class="search-btn w-100">

<i class=
"fa-solid fa-magnifying-glass"></i>

Search

</button>

</div>

</div>

</form>

</div>


<!-- EMPLOYEE LIST -->

<div class="row g-4">

<div class="col-xl-3 col-lg-4 col-md-6"
     th:each="employee : ${employees}">

<div class="employee-card">

<!-- TOP -->

<div class="card-top">

<img th:src="${employee.photo}"
     class="profile-img"
     onerror=
     "this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">

<div class="employee-name">

<span th:text="${employee.firstName}">
</span>

<span th:text="${employee.lastName}">
</span>

</div>

<div class="employee-id">

Employee ID :
<span th:text="${employee.employeeId}">
</span>

</div>

</div>

<!-- BODY -->

<div class="card-body-custom">

<div class="info-row">

<i class=
"fa-solid fa-envelope"></i>

<span th:text="${employee.email}">
</span>

</div>

<div class="info-row">

<i class=
"fa-solid fa-phone"></i>

<span th:text="${employee.phoneNumber}">
</span>

</div>

<div class="info-row">

<i class=
"fa-solid fa-building"></i>

<span th:text="${employee.department}">
</span>

</div>

<div class="info-row">

<i class=
"fa-solid fa-briefcase"></i>

<span th:text="${employee.designation}">
</span>

</div>

<div class="info-row">

<i class=
"fa-solid fa-location-dot"></i>

<span th:text="${employee.city}">
</span>

</div>

<div class="info-row">

<i class=
"fa-solid fa-user-tie"></i>

<span th:text="${employee.managerName}">
</span>

</div>

<div class="info-row">

<i class=
"fa-solid fa-indian-rupee-sign"></i>

₹ <span th:text="${employee.salary}">
</span>

</div>

<div class="mt-3">

<span th:classappend=
"${employee.status == 'Active'} ? 'active' : 'pending'"

class="status"
th:text="${employee.status}">

</span>

</div>

<!-- BUTTONS -->

<div class=
"d-flex justify-content-between
action-buttons">

<a th:href=
"@{/admin/updateEmployee/{id}
(id=${employee.employeeId})}">

<button class="update-btn">

<i class=
"fa-solid fa-pen"></i>

Update

</button>

</a>

<a th:href=
"@{/admin/deleteEmployee/{id}
(id=${employee.employeeId})}">

<button class="delete-btn">

<i class=
"fa-solid fa-trash"></i>

Delete

</button>

</a>

</div>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
