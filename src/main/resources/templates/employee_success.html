<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Success</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:
    linear-gradient(135deg,#0f172a,#111827,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.success-box{
    width:500px;
    background:rgba(255,255,255,0.08);
    padding:50px;
    border-radius:25px;
    text-align:center;
    color:white;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.success-icon{
    font-size:70px;
    color:#22c55e;
}

h1{
    margin-top:20px;
    font-size:38px;
    font-weight:800;
}

p{
    color:#cbd5e1;
}

.btn-custom{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-weight:bold;
    font-size:18px;
}

.dashboard-btn{
    background:#2563eb;
    color:white;
}

.add-btn{
    background:#22c55e;
    color:white;
}

</style>

</head>

<body>

<div class="success-box">

<div class="success-icon">

✔

</div>

<h1>Employee Added Successfully</h1>

<p>The employee details were saved successfully.</p>

<a href="/admin/dashboard"
class="btn btn-custom dashboard-btn">

Return to Dashboard

</a>

<a href="/addEmployee"
class="btn btn-custom add-btn">

Add Another Employee

</a>

</div>

</body>
</html>
