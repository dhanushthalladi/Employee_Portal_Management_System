<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Update Employee</title>

    <link href=
    "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .card{
            border-radius:20px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="text-center mb-4">

    Update Employee Details

</h2>

<form th:action="@{/admin/updateEmployee}"
      th:object="${employee}"
      method="post">

<input type="hidden"
       th:field="*{employeeId}">


<div class="row">

<!-- First Name -->

<div class="col-md-6 mb-3">

<label>First Name</label>

<input type="text"
       th:field="*{firstName}"
       class="form-control">

</div>


<!-- Last Name -->

<div class="col-md-6 mb-3">

<label>Last Name</label>

<input type="text"
       th:field="*{lastName}"
       class="form-control">

</div>


<!-- Email -->

<div class="col-md-6 mb-3">

<label>Email</label>

<input type="email"
       th:field="*{email}"
       class="form-control">

</div>


<!-- Phone -->

<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input type="text"
       th:field="*{phoneNumber}"
       class="form-control">

</div>


<!-- Alternate Phone -->

<div class="col-md-6 mb-3">

<label>Alternate Phone</label>

<input type="text"
       th:field="*{alternatePhone}"
       class="form-control">

</div>


<!-- Gender -->

<div class="col-md-6 mb-3">

<label>Gender</label>

<select th:field="*{gender}"
        class="form-control">

<option value="Male">Male</option>

<option value="Female">Female</option>

<option value="Other">Other</option>

</select>

</div>


<!-- DOB -->

<div class="col-md-6 mb-3">

<label>Date Of Birth</label>

<input type="date"
       th:field="*{dateOfBirth}"
       class="form-control">

</div>


<!-- Joining Date -->

<div class="col-md-6 mb-3">

<label>Joining Date</label>

<input type="date"
       th:field="*{joiningDate}"
       class="form-control">

</div>


<!-- Department -->

<div class="col-md-6 mb-3">

<label>Department</label>

<input type="text"
       th:field="*{department}"
       class="form-control">

</div>


<!-- Designation -->

<div class="col-md-6 mb-3">

<label>Designation</label>

<input type="text"
       th:field="*{designation}"
       class="form-control">

</div>


<!-- Salary -->

<div class="col-md-6 mb-3">

<label>Salary</label>

<input type="number"
       th:field="*{salary}"
       class="form-control">

</div>


<!-- Manager -->

<div class="col-md-6 mb-3">

<label>Manager Name</label>

<input type="text"
       th:field="*{managerName}"
       class="form-control">

</div>


<!-- Employment Type -->

<div class="col-md-6 mb-3">

<label>Employment Type</label>

<select th:field="*{employmentType}"
        class="form-control">

<option value="Full-time">
Full-time
</option>

<option value="Intern">
Intern
</option>

<option value="Contract">
Contract
</option>

</select>

</div>


<!-- Status -->

<div class="col-md-6 mb-3">

<label>Status</label>

<select th:field="*{status}"
        class="form-control">

<option value="Active">
Active
</option>

<option value="Inactive">
Inactive
</option>

</select>

</div>


<!-- Address -->

<div class="col-md-12 mb-3">

<label>Address</label>

<textarea th:field="*{address}"
          class="form-control">
</textarea>

</div>


<!-- City -->

<div class="col-md-4 mb-3">

<label>City</label>

<input type="text"
       th:field="*{city}"
       class="form-control">

</div>


<!-- State -->

<div class="col-md-4 mb-3">

<label>State</label>

<input type="text"
       th:field="*{state}"
       class="form-control">

</div>


<!-- Pincode -->

<div class="col-md-4 mb-3">

<label>Pincode</label>

<input type="text"
       th:field="*{pincode}"
       class="form-control">

</div>


<!-- Photo -->

<div class="col-md-12 mb-4">

<label>Photo URL</label>

<input type="text"
       th:field="*{photo}"
       class="form-control">

</div>

</div>


<button type="submit"
        class="btn btn-success w-100">

    Update Employee

</button>

</form>

</div>

</div>

</body>
</html>
