<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(135deg,#0f172a,#1e293b,#111827);
    overflow-x:hidden;
    position:relative;
}

/* Animated Background */

body::before{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:#7c3aed;
    border-radius:50%;
    top:-150px;
    left:-100px;
    filter:blur(120px);
    opacity:0.5;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:#06b6d4;
    border-radius:50%;
    bottom:-120px;
    right:-100px;
    filter:blur(120px);
    opacity:0.4;
}

.main-container{
    position:relative;
    z-index:10;
    padding:40px 0;
}

.glass-card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border-radius:30px;
    box-shadow:
    0 8px 32px rgba(0,0,0,0.35);
    padding:40px;
    color:white;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
    flex-wrap:wrap;
}

.page-title{
    font-size:42px;
    font-weight:700;
    background:linear-gradient(to right,#ffffff,#cbd5e1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#cbd5e1;
    margin-top:8px;
    font-size:15px;
}

.back-btn{
    background:rgba(255,255,255,0.12);
    border:none;
    color:white;
    padding:12px 22px;
    border-radius:14px;
    text-decoration:none;
    transition:0.3s;
    font-weight:500;
}

.back-btn:hover{
    background:#7c3aed;
    transform:translateY(-2px);
    color:white;
}

.section-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:25px;
    margin-top:10px;
    color:#f8fafc;
    border-left:4px solid #8b5cf6;
    padding-left:12px;
}

.form-label{
    color:#e2e8f0;
    font-weight:500;
    margin-bottom:8px;
}

.form-control,
.form-select{
    background:rgba(255,255,255,0.10);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;
    color:white;
    padding:14px;
    transition:0.3s;
}

.form-control::placeholder{
    color:#cbd5e1;
}

.form-control:focus,
.form-select:focus{
    background:rgba(255,255,255,0.16);
    border-color:#8b5cf6;
    box-shadow:0 0 15px rgba(139,92,246,0.4);
    color:white;
}

.form-select option{
    color:black;
}

.input-group-text{
    background:#8b5cf6;
    border:none;
    color:white;
    border-radius:14px 0 0 14px;
}

.form-section{
    background:rgba(255,255,255,0.04);
    border-radius:22px;
    padding:28px;
    margin-bottom:28px;
    border:1px solid rgba(255,255,255,0.08);
}

.save-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
    color:white;
    font-size:18px;
    font-weight:600;
    transition:0.4s;
    margin-top:15px;
}

.save-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(124,58,237,0.5);
}

.icon{
    margin-right:8px;
}

.form-control[type="date"]{
    color:white;
}

.form-control[type="date"]::-webkit-calendar-picker-indicator{
    filter:invert(1);
}

@media(max-width:768px){

    .glass-card{
        padding:25px;
    }

    .page-title{
        font-size:30px;
    }

    .top-bar{
        gap:20px;
    }

}

</style>

</head>

<body>

<div class="container main-container">

<div class="glass-card">

    <!-- TOP -->

    <div class="top-bar">

        <div>

            <h1 class="page-title">

                <i class="fa-solid fa-user-plus"></i>

                Add Employee

            </h1>

            <p class="subtitle">
                Fill employee information and save securely
            </p>

        </div>

        <a th:href="@{/admin/dashboard}"
           class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back Dashboard

        </a>

    </div>

    <!-- SUCCESS -->

    <div th:if="${success}"
         class="alert alert-success text-center fw-bold rounded-4">

        <span th:text="${success}"></span>

    </div>

    <!-- FORM -->

    <form th:action="@{/admin/saveEmployee}"
          th:object="${employee}"
          method="post">

        <!-- PERSONAL -->

        <div class="form-section">

            <h4 class="section-title">

                <i class="fa-solid fa-id-card icon"></i>

                Personal Information

            </h4>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        First Name
                    </label>

                    <input type="text"
                           th:field="*{firstName}"
                           class="form-control"
                           placeholder="Enter first name">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Last Name
                    </label>

                    <input type="text"
                           th:field="*{lastName}"
                           class="form-control"
                           placeholder="Enter last name">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Date Of Birth
                    </label>

                    <input type="date"
                           th:field="*{dateOfBirth}"
                           class="form-control">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Gender
                    </label>

                    <select th:field="*{gender}"
                            class="form-select">

                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>

                    </select>

                </div>

            </div>

        </div>

        <!-- CONTACT -->

        <div class="form-section">

            <h4 class="section-title">

                <i class="fa-solid fa-phone icon"></i>

                Contact Information

            </h4>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           th:field="*{email}"
                           class="form-control"
                           placeholder="Enter email">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Phone Number
                    </label>

                    <input type="text"
                           th:field="*{phoneNumber}"
                           class="form-control"
                           placeholder="Enter phone number">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Alternate Phone
                    </label>

                    <input type="text"
                           th:field="*{alternatePhone}"
                           class="form-control"
                           placeholder="Enter alternate phone">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Address
                    </label>

                    <input type="text"
                           th:field="*{address}"
                           class="form-control"
                           placeholder="Enter address">

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        City
                    </label>

                    <input type="text"
                           th:field="*{city}"
                           class="form-control"
                           placeholder="City">

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        State
                    </label>

                    <input type="text"
                           th:field="*{state}"
                           class="form-control"
                           placeholder="State">

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        Pincode
                    </label>

                    <input type="text"
                           th:field="*{pincode}"
                           class="form-control"
                           placeholder="Pincode">

                </div>

            </div>

        </div>

        <!-- JOB -->

        <div class="form-section">

            <h4 class="section-title">

                <i class="fa-solid fa-briefcase icon"></i>

                Employment Details

            </h4>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Photo URL
                    </label>

                    <input type="text"
                           th:field="*{photo}"
                           class="form-control"
                           placeholder="Paste image url">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Joining Date
                    </label>

                    <input type="date"
                           th:field="*{joiningDate}"
                           class="form-control">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Department
                    </label>

                    <input type="text"
                           th:field="*{department}"
                           class="form-control"
                           placeholder="Department">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Designation
                    </label>

                    <input type="text"
                           th:field="*{designation}"
                           class="form-control"
                           placeholder="Designation">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Salary
                    </label>

                    <input type="number"
                           th:field="*{salary}"
                           class="form-control"
                           placeholder="Salary">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Manager Name
                    </label>

                    <input type="text"
                           th:field="*{managerName}"
                           class="form-control"
                           placeholder="Manager name">

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Employment Type
                    </label>

                    <select th:field="*{employmentType}"
                            class="form-select">

                        <option value="Full-time">Full-time</option>
                        <option value="Intern">Intern</option>
                        <option value="Contract">Contract</option>

                    </select>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Status
                    </label>

                    <select th:field="*{status}"
                            class="form-select">

                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>

                    </select>

                </div>

            </div>

        </div>

        <!-- BUTTON -->

        <button type="submit"
                class="save-btn">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Employee

        </button>

    </form>

</div>

</div>

</body>
</html>
