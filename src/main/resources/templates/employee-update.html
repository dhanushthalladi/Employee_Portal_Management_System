<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Update Profile</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card{
    border-radius:20px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-5">

<h2 class="text-center mb-4">

Update Profile

</h2>

<form th:action=
"@{/employee/updateProfile/{id}(id=${employee.employeeId})}"

th:object="${employee}"

method="post">


<div class="mb-3">

<label>Email</label>

<input type="email"
       th:field="*{email}"
       class="form-control">

</div>


<div class="mb-3">

<label>Phone Number</label>

<input type="text"
       th:field="*{phoneNumber}"
       class="form-control">

</div>


<div class="mb-3">

<label>Address</label>

<textarea th:field="*{address}"
          class="form-control">
</textarea>

</div>


<button type="submit"
        class="btn btn-success w-100">

    Update Details

</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
