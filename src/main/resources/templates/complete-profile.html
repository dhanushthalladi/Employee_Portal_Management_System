<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Complete Profile</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e293b,
    #2563eb);

    min-height:100vh;

    padding:40px;
}

/* MAIN CARD */

.profile-container{

    max-width:1450px;

    margin:auto;

    background:
    rgba(255,255,255,0.1);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.15);

    border-radius:30px;

    overflow:hidden;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.3);
}

/* HEADER */

.profile-header{

    background:
    linear-gradient(
    to right,
    #2563eb,
    #06b6d4);

    padding:45px;

    text-align:center;

    color:white;

    position:relative;
}

.profile-img{

    width:130px;
    height:130px;

    border-radius:50%;

    border:5px solid white;

    object-fit:cover;

    background:white;

    margin-bottom:20px;

    box-shadow:
    0 8px 25px rgba(0,0,0,0.25);
}

.profile-header h1{

    font-size:42px;

    font-weight:700;

    margin-bottom:10px;
}

.profile-header p{

    font-size:18px;

    color:#e0f2fe;
}

/* FORM SECTION */

.form-section{

    padding:45px;
}

/* INPUT LABELS */

.form-label{

    color:white;

    font-weight:600;

    margin-bottom:10px;
}

/* INPUTS */

.form-control,
.form-select{

    height:58px;

    border:none;

    border-radius:16px;

    background:
    rgba(255,255,255,0.92);

    padding-left:18px;

    font-size:15px;

    transition:0.3s;
}

textarea.form-control{

    height:120px;

    padding-top:15px;
}

.form-control:focus,
.form-select:focus{

    box-shadow:
    0 0 0 4px rgba(59,130,246,0.3);

    transform:translateY(-1px);
}

/* SECTION TITLE */

.section-title{

    color:white;

    font-size:22px;

    font-weight:700;

    margin-bottom:25px;

    margin-top:20px;
}

/* SAVE BUTTON */

.save-btn{

    width:100%;

    height:60px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
    to right,
    #22c55e,
    #16a34a);

    color:white;

    font-size:20px;

    font-weight:700;

    transition:0.3s;

    margin-top:35px;
}

.save-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 12px 25px rgba(34,197,94,0.35);
}

/* SMALL CARD EFFECT */

.input-box{

    margin-bottom:28px;
}

/* RESPONSIVE */

@media(max-width:768px){

    body{

        padding:15px;
    }

    .profile-header h1{

        font-size:30px;
    }

    .form-section{

        padding:25px;
    }
}

</style>

</head>

<body>

<div class="profile-container">

    <!-- HEADER -->

    <div class="profile-header">

        <img th:src="${employee.photo}"
             class="profile-img"
             onerror=
             "this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">

        <h1>

            Complete Employee Profile

        </h1>

        <p>

            Fill and manage employee information professionally

        </p>

    </div>


    <!-- FORM SECTION -->

    <div class="form-section">

        <form th:action=
        "@{/employee/saveProfile/{id}(id=${employee.employeeId})}"

        th:object="${employee}"

        method="post">

        <div class="row">

        <!-- FIRST NAME -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                First Name

            </label>

            <input type="text"
                   th:field="*{firstName}"
                   class="form-control">

        </div>

        <!-- LAST NAME -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Last Name

            </label>

            <input type="text"
                   th:field="*{lastName}"
                   class="form-control">

        </div>

        <!-- DOB -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Date Of Birth

            </label>

            <input type="date"
                   th:field="*{dateOfBirth}"
                   class="form-control">

        </div>

        <!-- GENDER -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Gender

            </label>

            <select th:field="*{gender}"
                    class="form-select">

                <option value="Male">
                    Male
                </option>

                <option value="Female">
                    Female
                </option>

                <option value="Other">
                    Other
                </option>

            </select>

        </div>

        <!-- EMAIL -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Email

            </label>

            <input type="email"
                   th:field="*{email}"
                   class="form-control">

        </div>

        <!-- PHONE -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Phone Number

            </label>

            <input type="text"
                   th:field="*{phoneNumber}"
                   class="form-control">

        </div>

        <!-- ALTERNATE PHONE -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Alternate Phone

            </label>

            <input type="text"
                   th:field="*{alternatePhone}"
                   class="form-control">

        </div>

        <!-- ADDRESS -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Address

            </label>

            <input type="text"
                   th:field="*{address}"
                   class="form-control">

        </div>

        <!-- CITY -->

        <div class="col-md-4 input-box">

            <label class="form-label">

                City

            </label>

            <input type="text"
                   th:field="*{city}"
                   class="form-control">

        </div>

        <!-- STATE -->

        <div class="col-md-4 input-box">

            <label class="form-label">

                State

            </label>

            <input type="text"
                   th:field="*{state}"
                   class="form-control">

        </div>

        <!-- PINCODE -->

        <div class="col-md-4 input-box">

            <label class="form-label">

                Pincode

            </label>

            <input type="text"
                   th:field="*{pincode}"
                   class="form-control">

        </div>

        <!-- PHOTO -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Photo URL

            </label>

            <input type="text"
                   th:field="*{photo}"
                   class="form-control">

        </div>

        <!-- JOINING DATE -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Joining Date

            </label>

            <input type="date"
                   th:field="*{joiningDate}"
                   class="form-control">

        </div>

        <!-- DEPARTMENT -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Department

            </label>

            <input type="text"
                   th:field="*{department}"
                   class="form-control">

        </div>

        <!-- DESIGNATION -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Designation

            </label>

            <input type="text"
                   th:field="*{designation}"
                   class="form-control">

        </div>

        <!-- SALARY -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Salary

            </label>

            <input type="number"
                   th:field="*{salary}"
                   class="form-control">

        </div>

        <!-- MANAGER -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Manager Name

            </label>

            <input type="text"
                   th:field="*{managerName}"
                   class="form-control">

        </div>

        <!-- EMPLOYMENT TYPE -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Employment Type

            </label>

            <select th:field="*{employmentType}"
                    class="form-select">

                <option value="Full-time">
                    Full-time
                </option>

                <option value="Intern">
                    Intern
                </option>

                <option value="Contract">
                    Contract
                </option>

            </select>

        </div>

        <!-- STATUS -->

        <div class="col-md-6 input-box">

            <label class="form-label">

                Status

            </label>

            <select th:field="*{status}"
                    class="form-select">

                <option value="Active">
                    Active
                </option>

                <option value="Inactive">
                    Inactive
                </option>

            </select>

        </div>

        </div>

        <!-- BUTTON -->

        <button type="submit"
                class="save-btn">

            Save Employee Profile

        </button>

        </form>

    </div>

</div>

</body>
</html>
