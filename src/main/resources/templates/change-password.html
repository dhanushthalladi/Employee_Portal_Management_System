<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Change Password</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card shadow p-4">

<h2 class="text-center mb-4">

Change Password

</h2>

<form action="/employee/savePassword"
      method="post">

<input type="hidden"
       name="employeeId"
       th:value="${employeeId}">

<div class="mb-3">

<label>New Password</label>

<input type="password"
       name="password"
       class="form-control">

</div>

<button type="submit"
        class="btn btn-warning w-100">

    Change Password

</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
