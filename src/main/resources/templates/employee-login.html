<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Employee Login</title>

    <link href=
    "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link href=
    "https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            height:100vh;

            overflow:hidden;

            background:
            linear-gradient(
            135deg,
            #4e54c8,
            #8f94fb);

            position:relative;
        }

        /* Animated Background Circles */

        .circle{

            position:absolute;

            border-radius:50%;

            background:
            rgba(255,255,255,0.1);

            animation:float 8s infinite ease-in-out;
        }

        .circle1{

            width:350px;
            height:350px;

            top:-100px;
            left:-100px;
        }

        .circle2{

            width:250px;
            height:250px;

            bottom:-80px;
            right:-80px;

            animation-delay:2s;
        }

        .circle3{

            width:180px;
            height:180px;

            top:40%;
            left:10%;

            animation-delay:4s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }
        }


        /* Main Container */

        .main-container{

            display:flex;

            height:100vh;

            position:relative;

            z-index:2;
        }


        /* Left Side */

        .left-panel{

            width:50%;

            display:flex;

            flex-direction:column;

            justify-content:center;

            padding-left:80px;

            color:white;
        }

        .portal-title{

            font-size:60px;

            font-weight:700;

            line-height:1.2;
        }

        .portal-subtitle{

            margin-top:20px;

            font-size:20px;

            color:#f1f1f1;

            width:75%;
        }

        .portal-badge{

            margin-top:40px;

            display:inline-block;

            background:rgba(255,255,255,0.15);

            padding:14px 30px;

            border-radius:40px;

            backdrop-filter:blur(10px);

            font-weight:500;
        }


        /* Right Side */

        .right-panel{

            width:50%;

            display:flex;

            justify-content:center;

            align-items:center;
        }


        /* Login Box */

        .login-container{

            width:430px;

            padding:45px;

            border-radius:30px;

            background:
            rgba(255,255,255,0.12);

            backdrop-filter:blur(20px);

            border:
            1px solid rgba(255,255,255,0.2);

            box-shadow:
            0 8px 40px rgba(0,0,0,0.25);

            color:white;
        }

        .login-title{

            text-align:center;

            font-size:42px;

            font-weight:700;

            margin-bottom:10px;
        }

        .login-subtitle{

            text-align:center;

            margin-bottom:35px;

            color:#f1f1f1;
        }

        .form-control{

            height:58px;

            border:none;

            border-radius:15px;

            padding-left:20px;

            font-size:16px;

            margin-bottom:20px;
        }

        .form-control:focus{

            box-shadow:none;

            border:2px solid #ffffff;
        }

        .btn-login{

            width:100%;

            height:58px;

            border:none;

            border-radius:15px;

            font-size:18px;

            font-weight:600;

            background:
            linear-gradient(
            to right,
            #00c6ff,
            #0072ff);

            color:white;

            transition:0.3s;
        }

        .btn-login:hover{

            transform:translateY(-3px);

            box-shadow:
            0 10px 25px rgba(0,0,0,0.3);
        }

        .btn-register{

            width:100%;

            height:58px;

            border:none;

            border-radius:15px;

            margin-top:18px;

            font-size:18px;

            font-weight:600;

            background:
            linear-gradient(
            to right,
            #11998e,
            #38ef7d);

            color:white;

            display:flex;

            justify-content:center;

            align-items:center;

            text-decoration:none;

            transition:0.3s;
        }

        .btn-register:hover{

            transform:translateY(-3px);

            box-shadow:
            0 10px 25px rgba(0,0,0,0.3);

            color:white;
        }

        .footer-text{

            text-align:center;

            margin-top:25px;

            color:#f5f5f5;
        }


        /* Responsive */

        @media(max-width:992px){

            .left-panel{
                display:none;
            }

            .right-panel{
                width:100%;
            }
        }
		
		
		/* BACK TO PORTAL BUTTON */

		.back-portal-btn{

		    width:100%;

		    height:58px;

		    margin-top:18px;

		    border-radius:16px;

		    display:flex;

		    align-items:center;

		    justify-content:center;

		    gap:12px;

		    text-decoration:none;

		    background:
		    rgba(255,255,255,0.08);

		    border:
		    1px solid rgba(255,255,255,0.15);

		    backdrop-filter:blur(12px);

		    color:white;

		    font-size:18px;

		    font-weight:600;

		    transition:0.35s ease;

		    position:relative;

		    overflow:hidden;
		}

		.back-portal-btn::before{

		    content:"";

		    position:absolute;

		    width:100%;
		    height:100%;

		    background:
		    linear-gradient(
		    120deg,
		    transparent,
		    rgba(255,255,255,0.15),
		    transparent);

		    left:-100%;

		    transition:0.6s;
		}

		.back-portal-btn:hover::before{

		    left:100%;
		}

		.back-portal-btn:hover{

		    transform:
		    translateY(-3px);

		    background:
		    linear-gradient(
		    to right,
		    #7c3aed,
		    #2563eb);

		    color:white;

		    box-shadow:
		    0 10px 25px rgba(37,99,235,0.35);
		}

		.arrow{

		    width:34px;
		    height:34px;

		    border-radius:50%;

		    background:
		    rgba(255,255,255,0.15);

		    display:flex;

		    align-items:center;

		    justify-content:center;

		    font-size:14px;
		}

    </style>

</head>

<body>

<!-- Background Shapes -->

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>


<div class="main-container">

    <!-- Left Branding -->

    <div class="left-panel">

        <div class="portal-title">

            Employee Portal<br>

            Management System

        </div>

        <div class="portal-subtitle">

            Securely manage employee records,
            leaves, profiles, approvals and
            organization workflows in one place.

        </div>

        <div class="portal-badge">

            Modern HR Management Solution

        </div>

    </div>


    <!-- Login Panel -->

    <div class="right-panel">

        <div class="login-container">

            <div class="login-title">

                Employee Login

            </div>

            <div class="login-subtitle">

                Access your dashboard securely

            </div>


            <form action="/employee/employeeLogin"
                  method="post">

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter Username"
                       required>


                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter Password"
                       required>


                <button type="submit"
                        class="btn btn-login">

                    Login

                </button>

            </form>


            <a href="/employee/register"
               class="btn-register">

                Register New Employee

            </a>
			
			<a href="/"
			   class="back-portal-btn">

			    <span class="arrow">

			        <i class=
			        "fa-solid fa-arrow-left"></i>

			    </span>

			    <span>

			        Back To Portal

			    </span>

			</a>


            <div class="footer-text">

                Employee Portal Management System

            </div>

        </div>

    </div>

</div>

</body>
</html>
