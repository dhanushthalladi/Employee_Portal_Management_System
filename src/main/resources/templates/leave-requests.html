<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Leave Requests</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #111827,
    #1e293b);

    min-height:100vh;

    color:white;

    overflow-x:hidden;
}

/* GLOW EFFECTS */

body::before{

    content:"";

    position:absolute;

    width:400px;
    height:400px;

    background:
    rgba(37,99,235,0.25);

    border-radius:50%;

    top:-120px;
    left:-100px;

    filter:blur(90px);
}

body::after{

    content:"";

    position:absolute;

    width:350px;
    height:350px;

    background:
    rgba(168,85,247,0.25);

    border-radius:50%;

    bottom:-120px;
    right:-100px;

    filter:blur(90px);
}

/* MAIN */

.main-container{

    position:relative;

    z-index:1;

    padding:50px;
}

/* HEADER */

.page-header{

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    padding:35px;

    margin-bottom:35px;

    box-shadow:
    0 15px 35px rgba(0,0,0,0.35);
}

.page-header h1{

    font-size:46px;

    font-weight:700;

    background:
    linear-gradient(
    to right,
    #38bdf8,
    #a855f7);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.page-header p{

    color:#cbd5e1;

    margin-top:10px;

    font-size:17px;
}

/* DASHBOARD BUTTON */

.dashboard-btn{

    background:
    linear-gradient(
    to right,
    #2563eb,
    #06b6d4);

    border:none;

    color:white;

    padding:12px 24px;

    border-radius:15px;

    font-weight:600;

    text-decoration:none;

    transition:0.3s;
}

.dashboard-btn:hover{

    transform:scale(1.05);

    color:white;
}

/* TABLE BOX */

.table-box{

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    padding:30px;

    box-shadow:
    0 15px 35px rgba(0,0,0,0.35);
}

/* TABLE */

.table{

    margin-bottom:0;

    border-radius:20px;

    overflow:hidden;
}

/* ADVANCED TABLE HEADER */

.table-header th{

    color:#ffffff !important;

    font-size:16px;

    font-weight:700;

    padding:22px;

    border:none;

    letter-spacing:0.5px;

    vertical-align:middle;

    white-space:nowrap;

    background:transparent !important;
}

.table-header th span{

    color:#ffffff !important;

    margin-left:8px;
}

.table-header i{

    color:#c4b5fd !important;

    font-size:15px;
}

/* FIXED ROW COLORS */

.table tbody tr{

    background:white;

    transition:0.3s;
}

.table tbody tr:hover{

    background:#f8fafc;

    transform:scale(1.01);
}

/* FIXED TEXT VISIBILITY */

.table tbody td{

    padding:20px;

    color:#1e293b;

    vertical-align:middle;

    border-color:
    rgba(0,0,0,0.08);

    font-weight:500;
}

/* STATUS */

.status-badge{

    padding:8px 18px;

    border-radius:30px;

    font-size:13px;

    font-weight:600;
}

.pending{

    background:
    linear-gradient(
    to right,
    #f59e0b,
    #facc15);

    color:black;
}

.approved{

    background:
    linear-gradient(
    to right,
    #22c55e,
    #16a34a);

    color:white;
}

.rejected{

    background:
    linear-gradient(
    to right,
    #ef4444,
    #dc2626);

    color:white;
}

/* BUTTONS */

.btn-custom{

    border:none;

    border-radius:12px;

    padding:10px 18px;

    font-weight:600;

    transition:0.3s;
}

.btn-custom:hover{

    transform:scale(1.05);
}

.approve-btn{

    background:
    linear-gradient(
    to right,
    #22c55e,
    #16a34a);

    color:white;
}

.reject-btn{

    background:
    linear-gradient(
    to right,
    #ef4444,
    #dc2626);

    color:white;
}

/* EMPTY STATE */

.empty-box{

    text-align:center;

    padding:70px;
}

.empty-box i{

    font-size:90px;

    color:#94a3b8;

    margin-bottom:20px;
}

.empty-box h3{

    font-size:34px;

    font-weight:700;
}

.empty-box p{

    color:#cbd5e1;

    margin-top:10px;
}

/* RESPONSIVE */

@media(max-width:768px){

    .main-container{

        padding:20px;
    }

    .page-header h1{

        font-size:32px;
    }
}

</style>

</head>

<body>

<div class="container-fluid main-container">

<!-- HEADER -->

<div class="page-header">

<div class=
"d-flex justify-content-between
align-items-center flex-wrap">

<div>

<h1>

<i class=
"fa-solid fa-calendar-check"></i>

Employee Leave Requests

</h1>

<p>

Approve or reject employee leave requests professionally

</p>

</div>

<a href="/admin/dashboard"
class="dashboard-btn mt-3 mt-md-0">

<i class=
"fa-solid fa-arrow-left"></i>

Dashboard

</a>

</div>

</div>

<!-- TABLE -->

<div class="table-box">

<div th:if="${#lists.isEmpty(leaves)}"
class="empty-box">

<i class=
"fa-solid fa-calendar-xmark"></i>

<h3>

No Leave Requests

</h3>

<p>

There are currently no employee leave requests

</p>

</div>

<div th:unless=
"${#lists.isEmpty(leaves)}"
class="table-responsive">

<table class=
"table table-borderless align-middle">

<thead class="table-header">

<tr>

<th class="text-white">
<i class="fa-solid fa-user"></i>
<span>Employee</span>
</th>

<th class="text-white">
<i class="fa-solid fa-notes-medical"></i>
<span>Leave Type</span>
</th>

<th class="text-white">
<i class="fa-solid fa-calendar-days"></i>
<span>From Date</span>
</th>

<th class="text-white">
<i class="fa-solid fa-calendar-check"></i>
<span>To Date</span>
</th>

<th class="text-white">
<i class="fa-solid fa-comment"></i>
<span>Reason</span>
</th>

<th class="text-white">
<i class="fa-solid fa-signal"></i>
<span>Status</span>
</th>

<th class="text-white">
<i class="fa-solid fa-gears"></i>
<span>Actions</span>
</th>

</tr>

</thead>
<tbody>

<tr th:each=
"leave : ${leaves}">

<td>

<i class=
"fa-solid fa-user"></i>

<span th:text=
"${leave.employee.firstName}">
</span>

</td>

<td th:text=
"${leave.leaveType}">
</td>

<td th:text=
"${leave.fromDate}">
</td>

<td th:text=
"${leave.toDate}">
</td>

<td th:text=
"${leave.reason}">
</td>

<td>

<span th:if=
"${leave.status == 'Pending'}"

class=
"status-badge pending">

Pending

</span>

<span th:if=
"${leave.status == 'Approved'}"

class=
"status-badge approved">

Approved

</span>

<span th:if=
"${leave.status == 'Rejected'}"

class=
"status-badge rejected">

Rejected

</span>

</td>

<td>

<div class="d-flex gap-2">

<a th:href=
"@{/admin/approveLeave/{id}
(id=${leave.leaveId})}"

class=
"btn btn-custom approve-btn">

<i class=
"fa-solid fa-check"></i>

Approve

</a>

<a th:href=
"@{/admin/rejectLeave/{id}
(id=${leave.leaveId})}"

class=
"btn btn-custom reject-btn">

<i class=
"fa-solid fa-xmark"></i>

Reject

</a>

</div>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
